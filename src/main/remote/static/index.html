<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>The Cog Remote</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header">
    <div class="header-row">
      <span id="connection-badge" class="badge ok">🟢 1</span>
      <span id="project-name">Loading...</span>
      <span id="session-time" class="session-time"></span>
      <button id="workshop-btn" class="workshop-btn hidden" title="Workshop">&#128295; Workshop</button>
      <button id="refresh-btn" title="Refresh" aria-label="Refresh">⟳</button>
    </div>
    <div id="agent-summary" class="header-sub">— agents</div>
  </header>

  <main id="content">
    <section id="agents-section" class="card-section">
      <h2 class="section-header" data-toggle="agents-list">▼ AGENTS</h2>
      <div id="agents-list" class="section-body"></div>
    </section>

    <section id="schedules-section" class="card-section">
      <h2 class="section-header" data-toggle="schedules-list">▼ SCHEDULES</h2>
      <div id="schedules-list" class="section-body"></div>
    </section>

    <section id="pinboard-section" class="card-section">
      <h2 class="section-header" data-toggle="pinboard-list">
        ▼ PINBOARD
        <button id="add-task-btn" class="inline-btn">+</button>
      </h2>
      <div id="pinboard-list" class="section-body"></div>
    </section>

    <div id="status-message" class="status-message"></div>
  </main>

  <!-- Workshop passcode entry -->
  <div id="workshop-passcode" class="overlay hidden">
    <div class="passcode-card">
      <h3>Enter Workshop Passcode</h3>
      <div id="passcode-boxes" class="passcode-boxes">
        <input type="tel" maxlength="1" class="pin-box" data-idx="0" inputmode="numeric" />
        <input type="tel" maxlength="1" class="pin-box" data-idx="1" inputmode="numeric" />
        <input type="tel" maxlength="1" class="pin-box" data-idx="2" inputmode="numeric" />
        <input type="tel" maxlength="1" class="pin-box" data-idx="3" inputmode="numeric" />
      </div>
      <div id="passcode-error" class="passcode-error"></div>
      <button id="passcode-cancel" class="passcode-cancel-btn">Cancel</button>
    </div>
  </div>

  <!-- Workshop spatial canvas -->
  <div id="workshop-view" class="hidden">
    <div id="workshop-header" class="workshop-header">
      <span id="workshop-back" class="workshop-back">&larr; Back</span>
      <span class="workshop-title">Workshop</span>
      <span id="workshop-hint" class="workshop-hint">pinch to zoom</span>
    </div>
    <div id="workshop-canvas-viewport">
      <div id="workshop-canvas"></div>
    </div>
  </div>

  <!-- Workshop panel detail view (pinboard, info) -->
  <div id="workshop-panel" class="hidden">
    <div id="panel-header" class="detail-header" style="background:#1e1e1e;border-bottom:1px solid #333;">
      <span id="panel-back" class="detail-back-btn">&larr;</span>
      <span id="panel-title" class="detail-name"></span>
    </div>
    <div id="panel-content" class="panel-content"></div>
  </div>

  <!-- Workshop agent detail view -->
  <div id="workshop-detail" class="hidden">
    <div id="detail-header" class="detail-header">
      <span id="detail-back" class="detail-back-btn">&larr;</span>
      <span id="detail-status-dot" class="detail-status-dot"></span>
      <span id="detail-name" class="detail-name"></span>
      <span id="detail-meta" class="detail-meta"></span>
      <button id="detail-stop" class="detail-stop-btn">Stop</button>
    </div>
    <div id="detail-output" class="detail-output"></div>
    <div class="detail-send-bar">
      <input id="detail-send-text" type="text" placeholder="Type a message..." />
      <button id="detail-send-btn">&uarr;</button>
    </div>
  </div>

  <footer id="send-bar">
    <select id="send-target" aria-label="Target agent"></select>
    <input id="send-text" type="text" placeholder="Type a message..." />
    <button id="send-btn">↑</button>
  </footer>

  <div id="task-modal" class="modal hidden">
    <div class="modal-card">
      <h3>New Task</h3>
      <input id="task-title" placeholder="Title" />
      <textarea id="task-description" placeholder="Description" rows="3"></textarea>
      <div class="modal-row">
        <label><input type="radio" name="priority" value="low"> Low</label>
        <label><input type="radio" name="priority" value="medium" checked> Medium</label>
        <label><input type="radio" name="priority" value="high"> High</label>
      </div>
      <div class="modal-actions">
        <button id="task-cancel">Cancel</button>
        <button id="task-submit">Post</button>
      </div>
    </div>
  </div>

  <div id="disconnected-overlay" class="overlay hidden">
    <div class="overlay-content">
      <h2>🔌 Disconnected</h2>
      <p>Remote View has been turned off or expired.</p>
      <p>Re-enable it from The Cog desktop to reconnect.</p>
    </div>
  </div>

  <script>window.__TOKEN__ = '__TOKEN_PLACEHOLDER__'</script>
  <script src="app.js"></script>
</body>
</html>
